        <div class="caixa1"></div>

        <div id="caixaEnergia">
            <p>Consumo de Energia do Busão do Povo (kw)</p>
        </div>
        <div id="imagem_busao">
            <img src="busao.jpg">
        </div>
        <div id="caixaCO2">
            <p>Consumo de CO2 (kg)</p>
        </div>
        <div id="caixaCusto">
            <u><b><p>Custo por Km: </p></b></u>
            <div id="resultado"></div>
            </div>

  <script>
    const custos = { onibus: 2.1 };

function calcular(km) {
    km = Number(km);
    if (isNaN(km) || km <= 0) {
        resultado.innerHTML = "Digite uma distância válida.";
        return;
    }
    resultado.innerHTML = `
        <br><p> Custo do Ônibus: R$ ${(km * custos.onibus).toFixed(2)}</p></br>
    `;
}

const kmInicial = localStorage.getItem("km");
if (kmInicial) calcular(kmInicial);

window.addEventListener("storage", (event) => {
    if (event.key === "km") calcular(event.newValue);
});
    </script>
    <script>

const energiaPorKm = 3.43;  
const co2PorKm = 0.94;       

function atualizarEnergiaECo2(km) {
    km = Number(km);

    if (isNaN(km) || km <= 0) {
        document.getElementById("caixaEnergia").innerHTML = "Consumo de Energia: —";
        document.getElementById("caixaCO2").innerHTML = "Consumo de CO₂: —";
        return;
    }

    const energiaTotal = km * energiaPorKm;
    const co2Total = km * co2PorKm;

    document.getElementById("caixaEnergia").innerHTML = `
        <u><p><b>Consumo de Energia:</b></p></u>
        <br>${energiaTotal.toFixed(2)} (base: ${energiaPorKm}/km)</br>
    `;

    document.getElementById("caixaCO2").innerHTML = `
        <u><p><b>Consumo de CO₂:</b></p></u>
        <br>${co2Total.toFixed(2)} (base: ${co2PorKm}/km)</br>
    `;
}


window.addEventListener("storage", (event) => {
    if (event.key === "km") {
        atualizarEnergiaECo2(event.newValue);
    }
});


const kmInicial2 = localStorage.getItem("km");
if (kmInicial2) atualizarEnergiaECo2(kmInicial2);
</script>
